<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELOCÍMETROS CDMX</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">
    <h1>VELOCÍMETROS CDMX</h1>
    <span>Ingeniería EEPROM • BIN Analysis</span>
</header>

<div class="main-layout">

    <aside class="sidebar">

        <h3>ARCHIVO</h3>

        <button id="openBtn">Abrir BIN</button>

        <button>Guardar BIN</button>

        <button>Comparar BIN</button>

        <h3>ANÁLISIS</h3>

        <button>Memory Map</button>

        <button>Counters</button>

        <button>Checksums</button>

        <h3>IA</h3>

        <button>DNA BIN</button>

        <button>AI Discovery</button>

        <h3>SIMULACIÓN</h3>

        <button>Digital Twin</button>

        <h3>GENERACIÓN</h3>

        <button>Generar BIN</button>

    </aside>

    <main class="content">

        <input
            type="file"
            id="fileInput"
            accept=".bin,.eep,.hex"
            hidden>

        <div class="info">

            <p>
                Archivo:
                <span id="fileName">Ninguno</span>
            </p>

            <p>
                Tamaño:
                <span id="fileSize">0</span>
                bytes
            </p>

        </div>

        <div id="hexViewer"></div>

    </main>

</div>

<script src="bin-object.js"></script>
<script src="bin-core.js"></script>
<script src="app.js"></script>

</body>
</html>
